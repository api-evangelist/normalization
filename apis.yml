aid: normalization
name: Normalization
description: >-
  Normalization is a data management concept used in database design and data
  processing to reduce data redundancy and improve data integrity. In databases,
  normalization organizes columns and tables to minimize duplication. In data
  processing, it refers to transforming data into a standard format for
  consistency and comparability.
